global_defs {
    router_id LVS_DEVEL
}
vrrp_script check_apiserver {
  script "/etc/keepalived/check_apiserver.sh"
  interval 3
  weight -2
  fall 10
  rise 2
}

vrrp_instance VI_1 {
    state MASTER # MASTER: origin Master, BACKUP: other control plane nodes
    interface ens160
    virtual_router_id 51
    priority 101 # 101: origin Master, HI-est priority, <101: other control plane nodes
    authentication {
        auth_type PASS
        auth_pass 42
    }
    virtual_ipaddress {
        200.200.1.10
    }
    track_script {
        check_apiserver
    }
}
